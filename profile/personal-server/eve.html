<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Redirecting...</title>
</head>
<body>
  <p>Redirecting...</p>

  <script>
    fetch("/tunnels.json")
      .then(res => res.json())
      .then(data => {
        window.location.href = data.eve;
      })
      .catch(() => {
        document.body.innerHTML = "Failed to load redirect.";
      });
  </script>
</body>
</html>
